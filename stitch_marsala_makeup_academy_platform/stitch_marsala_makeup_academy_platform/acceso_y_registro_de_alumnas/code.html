</div>
<!-- Main Auth Container -->
<main class="relative z-10 w-full max-w-[480px] perspective-1000">
<!-- Header / Logo -->
<div class="text-center mb-8">
<h1 class="font-headline-lg text-headline-lg font-bold text-deep-marsala tracking-tight mb-2">Makeup Academy</h1>
<p class="font-title-md text-on-surface-variant opacity-80">Domina el arte de la belleza académica</p>
</div>
<!-- Auth Card -->
<div class="glass-panel border border-blush-canvas/30 rounded-[2rem] shadow-2xl shadow-deep-marsala/5 p-8 md:p-12 form-transition" id="auth-card">
<!-- Toggle Tabs -->
<div class="flex p-1 bg-surface-container rounded-full mb-8 relative">
<button class="flex-1 py-2 rounded-full font-label-md text-label-md transition-all duration-300 z-10 text-primary font-bold" id="tab-login" onclick="toggleAuth('login')">Iniciar Sesión</button>
<button class="flex-1 py-2 rounded-full font-label-md text-label-md transition-all duration-300 z-10 text-on-surface-variant" id="tab-register" onclick="toggleAuth('register')">Crear Cuenta</button>
<div class="absolute h-[calc(100%-8px)] w-[calc(50%-4px)] bg-surface-container-lowest rounded-full top-1 left-1 shadow-sm transition-all duration-300 ease-out" id="tab-indicator"></div>
</div>
<!-- Login Form -->
<div class="space-y-6 block" id="login-form">
<form class="space-y-5" onsubmit="event.preventDefault();">
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-2 ml-1" for="login-email">CORREO ELECTRÓNICO</label>
<input class="w-full bg-surface-muted border-0 border-b-2 border-blush-canvas/40 focus:border-deep-marsala focus:ring-0 transition-colors py-3 px-4 rounded-t-lg text-body-md" id="login-email" placeholder="tu@academia.com" required="" type="email"/>
</div>
<div>
<div class="flex justify-between mb-2">
<label class="block font-label-sm text-label-sm text-on-surface-variant ml-1" for="login-password">CONTRASEÑA</label>
<a class="text-label-sm text-secondary hover:text-deep-marsala transition-colors" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-muted border-0 border-b-2 border-blush-canvas/40 focus:border-deep-marsala focus:ring-0 transition-colors py-3 px-4 rounded-t-lg text-body-md" id="login-password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-3 text-on-surface-variant hover:text-primary" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<button class="w-full bg-apricot-glow text-deep-marsala font-bold py-4 rounded-xl shadow-lg shadow-apricot-glow/20 hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 text-title-md">
                        Entrar al Campus
                    </button>
</form>
</div>
<!-- Register Form (Hidden by default) -->
<div class="space-y-6 hidden" id="register-form">
<form class="space-y-5" onsubmit="event.preventDefault();">
<div class="grid grid-cols-2 gap-4">
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-2 ml-1" for="reg-name">NOMBRE</label>
<input class="w-full bg-surface-muted border-0 border-b-2 border-blush-canvas/40 focus:border-deep-marsala focus:ring-0 transition-colors py-3 px-4 rounded-t-lg text-body-md" id="reg-name" placeholder="Ana" required="" type="text"/>
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-2 ml-1" for="reg-surname">APELLIDO</label>
<input class="w-full bg-surface-muted border-0 border-b-2 border-blush-canvas/40 focus:border-deep-marsala focus:ring-0 transition-colors py-3 px-4 rounded-t-lg text-body-md" id="reg-surname" placeholder="García" required="" type="text"/>
</div>
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-2 ml-1" for="reg-email">CORREO ELECTRÓNICO</label>
<input class="w-full bg-surface-muted border-0 border-b-2 border-blush-canvas/40 focus:border-deep-marsala focus:ring-0 transition-colors py-3 px-4 rounded-t-lg text-body-md" id="reg-email" placeholder="estudiante@academy.com" required="" type="email"/>
</div>

<button class="w-full bg-apricot-glow text-deep-marsala font-bold py-4 rounded-xl shadow-lg shadow-apricot-glow/20 hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 text-title-md">
                        Comenzar Mi Viaje

</div>

<div class="absolute inset-0 flex items-center">

</div>
<div class="relative flex justify-center text-label-sm uppercase">

<div class="space-y-4">

<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>

<span class="font-body-md text-on-surface">Continuar con Google</span>
</button>

<!-- Footer links -->
<p class="mt-8 text-center text-label-sm text-on-surface-variant leading-relaxed">
                Al continuar, aceptas nuestros 
                <a class="text-secondary font-bold hover:underline" href="#">Términos de Servicio</a> 
                y nuestra 
                <a class="text-secondary font-bold hover:underline" href="#">Política de Privacidad</a>.
            </p>
</div>
</main>
<script>
        function toggleAuth(type) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const tabIndicator = document.getElementById('tab-indicator');
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');
            const authCard = document.getElementById('auth-card');

            // Apply a subtle scale effect to card during transition
            authCard.classList.add('scale-[0.99]', 'opacity-90');

            setTimeout(() => {
                if (type === 'login') {
                    loginForm.classList.remove('hidden');
                    registerForm.classList.add('hidden');
                    tabIndicator.style.left = '4px';
                    tabLogin.classList.add('text-primary', 'font-bold');
                    tabLogin.classList.remove('text-on-surface-variant');
                    tabRegister.classList.remove('text-primary', 'font-bold');
                    tabRegister.classList.add('text-on-surface-variant');
                } else {
                    loginForm.classList.add('hidden');
                    registerForm.classList.remove('hidden');
                    tabIndicator.style.left = 'calc(50% - 0px)';
                    tabRegister.classList.add('text-primary', 'font-bold');
                    tabRegister.classList.remove('text-on-surface-variant');
                    tabLogin.classList.remove('text-primary', 'font-bold');
                    tabLogin.classList.add('text-on-surface-variant');
                }
                authCard.classList.remove('scale-[0.99]', 'opacity-90');
            }, 150);
        }

        // Simple validation feedback logic
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('blur', function() {
                if(this.value === "" && this.hasAttribute('required')) {
                    this.classList.add('border-error');
                    this.classList.remove('border-blush-canvas/40');
                } else {
                    this.classList.remove('border-error');
                    this.classList.add('border-blush-canvas/40');
                }
            });
            input.addEventListener('input', function() {
                this.classList.remove('border-error');
                this.classList.add('border-blush-canvas/40');
            });
        });
    </script>
</body></html>
